version: "3.8"

services:
  # ─── Redpanda (Kafka-compatible) ────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v23.3.11
    container_name: freightpulse-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"   # external Kafka API
      - "9092:9092"     # internal Kafka API
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # Pandaproxy
      - "9644:9644"     # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Redpanda topic initialiser ─────────────────────────────────────────────
  redpanda-init:
    image: redpandadata/redpanda:v23.3.11
    container_name: freightpulse-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      rpk topic create ingestion.news         --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true
      rpk topic create ingestion.weather      --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true
      rpk topic create ingestion.ais          --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true
      rpk topic create ingestion.port-congestion --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true
      rpk topic create disruption.detected   --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true
      rpk topic create engine.stage-updates  --brokers redpanda:9092 --partitions 1 --replicas 1 2>/dev/null || true
      echo 'All Kafka topics created.'
      "
    restart: "no"

  # ─── Neo4j (Community + APOC) ───────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: freightpulse-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── TimescaleDB (Postgres + Timescale extension) ────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: freightpulse-timescale
    environment:
      POSTGRES_USER: freightpulse
      POSTGRES_PASSWORD: freightpulse123
      POSTGRES_DB: freightpulse
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightpulse -d freightpulse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Redis (TwiML call-script cache + misc) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: freightpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redpanda_data:
  neo4j_data:
  neo4j_logs:
  timescale_data:
# Optional: run all services together
version: '3.8'

services:
  # Services will be configured here
=======
services:
  api:
    build: .
    command: sh -c "alembic upgrade head && python -m app.cli seed-graph && uvicorn app.main:create_app --host 0.0.0.0 --port 8000 --factory --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/lrie
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-secret
    ports: ["8000:8000"]
    volumes: [".:/srv/lrie"]
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_healthy
  worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/lrie
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-secret
    volumes: [".:/srv/lrie"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  beat:
    build: .
    command: celery -A app.core.celery_app.celery_app beat --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/lrie
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-secret
    volumes: [".:/srv/lrie"]
    depends_on:
      redis:
        condition: service_healthy
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: lrie
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d lrie"]
      interval: 10s
      timeout: 5s
      retries: 10
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password123
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  pgdata:
  neo4jdata:
